name: PR Comment Triggers

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

jobs:
  # ============================================
  # Parse PR Comment
  # ============================================
  parse:
    name: Parse Command
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/deploy') || startsWith(github.event.comment.body, '/test') || startsWith(github.event.comment.body, '/check'))

    outputs:
      valid: ${{ steps.parse.outputs.valid }}
      action: ${{ steps.parse.outputs.action }}
      environment: ${{ steps.parse.outputs.environment }}

    steps:
      - name: Parse command
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"

          # Extract command and environment
          if [[ "$COMMENT" =~ ^/deploy[[:space:]]+(adt|qat|crptrn) ]]; then
            echo "action=deploy" >> $GITHUB_OUTPUT
            echo "environment=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/test[[:space:]]+(adt|qat|crptrn) ]]; then
            echo "action=test" >> $GITHUB_OUTPUT
            echo "environment=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/check ]]; then
            echo "action=check" >> $GITHUB_OUTPUT
            echo "environment=" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # React to Comment
  # ============================================
  react:
    name: Add Reaction
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.valid == 'true'

    steps:
      - name: Add rocket emoji
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='rocket'
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Trigger Deployment
  # ============================================
  trigger-deploy:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    needs: parse
    if: |
      needs.parse.outputs.valid == 'true' &&
      needs.parse.outputs.action == 'deploy'

    outputs:
      workflow_id: ${{ steps.trigger.outputs.workflow_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Remove stale labels and trigger workflow
        id: trigger
        run: |
          ACTION="${{ needs.parse.outputs.action }}"
          ENV="${{ needs.parse.outputs.environment }}"
          PR_NUMBER="${{ github.event.issue.number }}"

          WORKFLOW_FILE="ado-pipeline-deploy.yml"
          ACTION_TEXT="Deployment"

          # Get PR head branch name
          echo "📋 Getting PR branch information..."
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          echo "Branch to deploy: $PR_BRANCH"

          # Remove stale labels before starting deployment
          echo "🗑️ Removing stale labels for $ENV environment..."
          gh pr edit "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --remove-label "deployed:$ENV" 2>/dev/null || echo "Label deployed:$ENV not present"
          gh pr edit "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --remove-label "tested:$ENV" 2>/dev/null || echo "Label tested:$ENV not present"

          gh workflow run "$WORKFLOW_FILE" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f pr_number="$PR_NUMBER" \
            -f pr_branch="$PR_BRANCH" \
            -f environment="$ENV" \
            -f triggered_by="${{ github.event.comment.user.login }}" \
            -f comment_id="${{ github.event.comment.id }}"

          # Wait a moment for the workflow to appear in the API
          sleep 5

          # Get the workflow run ID (most recent run of this workflow)
          WORKFLOW_ID=$(gh run list --repo "${{ github.repository }}" --workflow="$WORKFLOW_FILE" --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "workflow_id=$WORKFLOW_ID" >> $GITHUB_OUTPUT
          echo "📝 Triggered workflow run ID: $WORKFLOW_ID"

          # Update the original comment with status
          ORIGINAL_BODY="${{ github.event.comment.body }}"
          cat > /tmp/comment.txt <<EOF
          $ORIGINAL_BODY

          ---

          🚀 **$ACTION_TEXT triggered for \`$ENV\`**

          [View workflow runs →](${{ github.server_url }}/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE)
          EOF

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}" \
            -f body="$(cat /tmp/comment.txt)"
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Wait for Deployment to Complete
  # ============================================
  wait-for-deploy:
    name: Wait for Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 420 # 7 hours - longer than ADO's 6 hour limit
    needs: [parse, trigger-deploy]
    if: |
      needs.parse.outputs.action == 'deploy' &&
      needs.trigger-deploy.outputs.workflow_id != ''

    outputs:
      success: ${{ steps.wait.outputs.success }}

    steps:
      - name: Wait for deploy workflow to complete
        id: wait
        run: |
          WORKFLOW_ID="${{ needs.trigger-deploy.outputs.workflow_id }}"
          echo "⏳ Waiting for workflow run $WORKFLOW_ID to complete..."

          # Watch the workflow run (will block until completion)
          gh run watch $WORKFLOW_ID --repo "${{ github.repository }}" || true

          # Get the conclusion
          CONCLUSION=$(gh run view $WORKFLOW_ID --repo "${{ github.repository }}" --json conclusion --jq '.conclusion')
          echo "📊 Workflow conclusion: $CONCLUSION"

          if [ "$CONCLUSION" = "success" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Trigger Testing
  # ============================================
  trigger-test:
    name: Trigger Testing
    runs-on: ubuntu-latest
    needs: [parse, wait-for-deploy]
    outputs:
      workflow_id: ${{ steps.trigger.outputs.workflow_id }}
    if: |
      always() &&
      needs.parse.outputs.valid == 'true' &&
      (
        (needs.parse.outputs.action == 'test') ||
        (needs.parse.outputs.action == 'deploy' && needs.wait-for-deploy.outputs.success == 'true')
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Remove stale labels and trigger workflow
        id: trigger
        run: |
          ACTION="${{ needs.parse.outputs.action }}"
          ENV="${{ needs.parse.outputs.environment }}"
          PR_NUMBER="${{ github.event.issue.number }}"

          WORKFLOW_FILE="ado-pipeline-test.yml"
          ACTION_TEXT="Testing"

          # Get PR head branch name
          echo "📋 Getting PR branch information..."
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          echo "Branch to test: $PR_BRANCH"

          # Remove stale test label before starting
          echo "🗑️ Removing stale test label for $ENV environment..."
          gh pr edit "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --remove-label "tested:$ENV" 2>/dev/null || echo "Label tested:$ENV not present"

          gh workflow run "$WORKFLOW_FILE" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f pr_number="$PR_NUMBER" \
            -f pr_branch="$PR_BRANCH" \
            -f environment="$ENV" \
            -f triggered_by="${{ github.event.comment.user.login }}" \
            -f comment_id="${{ github.event.comment.id }}"

          # Wait a moment for the workflow to appear in the API
          sleep 5

          # Get the workflow run ID (most recent run of this workflow)
          WORKFLOW_ID=$(gh run list --repo "${{ github.repository }}" --workflow="$WORKFLOW_FILE" --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "workflow_id=$WORKFLOW_ID" >> $GITHUB_OUTPUT
          echo "📝 Triggered workflow run ID: $WORKFLOW_ID"

          # Update the original comment with testing triggered status
          # Sleep to ensure we get latest comment (after deploy might have updated it)
          sleep 2
          ORIGINAL_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}" --jq '.body')

          cat > /tmp/comment.txt <<EOF
          $ORIGINAL_BODY

          ---

          🚀 **$ACTION_TEXT triggered for \`$ENV\`**

          [View workflow runs →](${{ github.server_url }}/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE)
          EOF

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}" \
            -f body="$(cat /tmp/comment.txt)"

          echo "✅ Test workflow triggered for $ENV environment"
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Wait for Testing to Complete
  # ============================================
  wait-for-test:
    name: Wait for Testing
    runs-on: ubuntu-latest
    timeout-minutes: 480 # 8 hours - longer than ADO's 6 hour limit
    needs: [parse, trigger-test]
    if: |
      always() &&
      needs.parse.outputs.valid == 'true' &&
      needs.trigger-test.result == 'success'
    outputs:
      success: ${{ steps.wait.outputs.success }}
      workflow_id: ${{ needs.trigger-test.outputs.workflow_id }}

    steps:
      - name: Wait for test workflow to complete
        id: wait
        run: |
          WORKFLOW_ID="${{ needs.trigger-test.outputs.workflow_id }}"

          if [ -z "$WORKFLOW_ID" ]; then
            echo "❌ No workflow ID from trigger-test"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "⏳ Waiting for test workflow run $WORKFLOW_ID to complete..."

          # Watch the workflow run (blocks until completion)
          if gh run watch "$WORKFLOW_ID" --repo "${{ github.repository }}" --exit-status; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "✅ Test workflow completed successfully"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Test workflow failed"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Create Deployment Status Check
  # ============================================
  create-deployment-check:
    name: Create Deployment Status Check
    runs-on: ubuntu-latest
    needs: [parse, wait-for-test]
    if: |
      always() &&
      needs.parse.outputs.valid == 'true' &&
      (needs.parse.outputs.action == 'check' || needs.wait-for-test.result != 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run deployment status check
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"

          echo "🔍 Checking deployment status for PR #$PR_NUMBER..."

          # Get PR details including head SHA
          PR_DATA=$(gh pr view "$PR_NUMBER" --json headRefOid,baseRefOid --jq '.')
          HEAD_SHA=$(echo "$PR_DATA" | jq -r '.headRefOid')
          BASE_SHA=$(echo "$PR_DATA" | jq -r '.baseRefOid')

          echo "PR Head SHA: $HEAD_SHA"

          # Check for metadata changes
          METADATA_CHANGES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep '^Metadata/' || true)

          if [ -z "$METADATA_CHANGES" ]; then
            echo "✅ No metadata changes - deployment not required"
            STATE="success"
            DESCRIPTION="No metadata changes - deployment not required"
          else
            echo "📦 Metadata changes detected - checking labels..."
            
            # Get PR labels
            LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name')
            
            # Check for all 4 required labels
            HAS_DEPLOYED_QAT=$(echo "$LABELS" | grep -c "^deployed:qat$" || true)
            HAS_TESTED_QAT=$(echo "$LABELS" | grep -c "^tested:qat$" || true)
            HAS_DEPLOYED_CRPTRN=$(echo "$LABELS" | grep -c "^deployed:crptrn$" || true)
            HAS_TESTED_CRPTRN=$(echo "$LABELS" | grep -c "^tested:crptrn$" || true)
            
            MISSING_LABELS=()
            [ "$HAS_DEPLOYED_QAT" -eq 0 ] && MISSING_LABELS+=("deployed:qat")
            [ "$HAS_TESTED_QAT" -eq 0 ] && MISSING_LABELS+=("tested:qat")
            [ "$HAS_DEPLOYED_CRPTRN" -eq 0 ] && MISSING_LABELS+=("deployed:crptrn")
            [ "$HAS_TESTED_CRPTRN" -eq 0 ] && MISSING_LABELS+=("tested:crptrn")
            
            if [ ${#MISSING_LABELS[@]} -eq 0 ]; then
              echo "✅ All deployment labels present"
              STATE="success"
              DESCRIPTION="All deployment and testing requirements met"
            else
              echo "❌ Missing labels: ${MISSING_LABELS[*]}"
              STATE="failure"
              DESCRIPTION="Missing labels: ${MISSING_LABELS[*]}"
            fi
          fi

          # Create commit status check
          echo "📝 Creating commit status: $STATE"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/statuses/$HEAD_SHA" \
            -f state="$STATE" \
            -f description="$DESCRIPTION" \
            -f context="Verify Deployment Status"

          echo "✅ Deployment check status created: $STATE"
        env:
          GH_TOKEN: ${{ github.token }}
