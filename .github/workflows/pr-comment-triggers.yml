name: PR Comment Triggers

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write
  statuses: write

jobs:
  # ============================================
  # Parse PR Comment
  # ============================================
  parse:
    name: Parse Command
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/deploy') || startsWith(github.event.comment.body, '/check'))

    outputs:
      valid: ${{ steps.parse.outputs.valid }}
      action: ${{ steps.parse.outputs.action }}
      environment: ${{ steps.parse.outputs.environment }}

    steps:
      - name: Parse command
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"

          # Extract command and environment
          if [[ "$COMMENT" =~ ^/deploy[[:space:]]+(adt|qat|crptrn) ]]; then
            echo "action=deploy" >> $GITHUB_OUTPUT
            echo "environment=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/check ]]; then
            echo "action=check" >> $GITHUB_OUTPUT
            echo "environment=" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # React to Comment
  # ============================================
  react:
    name: Add Reaction
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.valid == 'true'

    steps:
      - name: Add rocket emoji
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='rocket'
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Get PR Branch (shared info for all triggers)
  # ============================================
  get-pr-info:
    name: Get PR Information
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.valid == 'true'
    outputs:
      pr_branch: ${{ steps.get-branch.outputs.pr_branch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get PR branch name
        id: get-branch
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          echo "📋 Getting PR branch information..."
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "Branch: $PR_BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Check PR Approval
  # ============================================
  check-approval:
    name: Check PR Approval
    runs-on: ubuntu-latest
    needs: [parse]
    if: |
      needs.parse.outputs.valid == 'true' &&
      needs.parse.outputs.action == 'deploy'
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    
    steps:
      - name: Check if PR is approved
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Checking approval status for PR #${{ github.event.issue.number }}..."
          
          # Get PR reviews
          REVIEWS=$(gh api "/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')
          
          if [ "$REVIEWS" -gt 0 ]; then
            echo "✅ PR has $REVIEWS approval(s)"
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "❌ PR is not approved"
            echo "approved=false" >> $GITHUB_OUTPUT
            
            # Update the original command comment with blocked status
            COMMENT_ID="${{ github.event.comment.id }}"
            ENV="${{ needs.parse.outputs.environment }}"
            ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')
            
            CURRENT_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/$COMMENT_ID" --jq '.body')
            
            # Build comment with blocked status
            NEW_BODY="$CURRENT_BODY

---

❌ **$ENV_UPPER Deployment Blocked**

This PR must be approved before deployment.

Please have a team member review and approve this PR first, then try again.

[View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              -f body="$NEW_BODY"
            
            exit 1
          fi

  # ============================================
  # Deploy (Build + Deploy in ADO Pipeline)
  # ============================================
  deploy:
    name: Deploy
    needs: [parse, get-pr-info, check-approval]
    if: |
      needs.parse.outputs.valid == 'true' &&
      needs.parse.outputs.action == 'deploy' &&
      needs.check-approval.outputs.approved == 'true'
    uses: ./.github/workflows/ado-pipeline-deploy.yml
    secrets: inherit
    with:
      pr_number: ${{ github.event.issue.number }}
      pr_branch: ${{ needs.get-pr-info.outputs.pr_branch }}
      environment: ${{ needs.parse.outputs.environment }}
      pipeline_id: '10591'
      yaml_branch: 'feature/git-refactor'  # TODO: Change to 'main' after merging
      triggered_by: ${{ github.event.comment.user.login }}
      comment_id: ${{ github.event.comment.id }}

  # ============================================
  # Create Deployment Status Check
  # ============================================
  create-deployment-check:
    name: Create Deployment Status Check
    runs-on: ubuntu-latest
    needs: [parse, deploy]
    if: |
      always() &&
      needs.parse.outputs.valid == 'true' &&
      needs.parse.outputs.action == 'check'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run deployment status check
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"

          echo "🔍 Checking deployment status for PR #$PR_NUMBER..."

          # Get PR details including head SHA
          PR_DATA=$(gh pr view "$PR_NUMBER" --json headRefOid,baseRefOid --jq '.')
          HEAD_SHA=$(echo "$PR_DATA" | jq -r '.headRefOid')
          BASE_SHA=$(echo "$PR_DATA" | jq -r '.baseRefOid')

          echo "PR Head SHA: $HEAD_SHA"

          # Check for metadata changes
          METADATA_CHANGES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep '^Metadata/' || true)

          if [ -z "$METADATA_CHANGES" ]; then
            echo "✅ No metadata changes - deployment not required"
            STATE="success"
            DESCRIPTION="No metadata changes - deployment not required"
          else
            echo "📦 Metadata changes detected - checking labels..."
            
            # Get PR labels
            LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name')
            
            # Check for deployment labels
            HAS_DEPLOYED_QAT=$(echo "$LABELS" | grep -c "^deployed:qat$" || true)
            HAS_DEPLOYED_CRPTRN=$(echo "$LABELS" | grep -c "^deployed:crptrn$" || true)
            
            MISSING_LABELS=()
            [ "$HAS_DEPLOYED_QAT" -eq 0 ] && MISSING_LABELS+=("deployed:qat")
            [ "$HAS_DEPLOYED_CRPTRN" -eq 0 ] && MISSING_LABELS+=("deployed:crptrn")
            
            if [ ${#MISSING_LABELS[@]} -eq 0 ]; then
              echo "✅ All deployment labels present"
              STATE="success"
              DESCRIPTION="All deployment requirements met (deployed:qat, deployed:crptrn)"
            else
              echo "❌ Missing labels: ${MISSING_LABELS[*]}"
              STATE="failure"
              DESCRIPTION="Missing labels: ${MISSING_LABELS[*]}"
            fi
          fi

          # Create commit status check
          echo "📝 Creating commit status: $STATE"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/statuses/$HEAD_SHA" \
            -f state="$STATE" \
            -f description="$DESCRIPTION" \
            -f context="Verify Deployment Status"

          echo "✅ Deployment check status created: $STATE"
        env:
          GH_TOKEN: ${{ github.token }}
