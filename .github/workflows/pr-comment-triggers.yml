name: PR Comment Triggers

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

jobs:
  # ============================================
  # Parse PR Comment
  # ============================================
  parse:
    name: Parse Command
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/deploy') || startsWith(github.event.comment.body, '/test'))
    
    outputs:
      valid: ${{ steps.parse.outputs.valid }}
      action: ${{ steps.parse.outputs.action }}
      environment: ${{ steps.parse.outputs.environment }}

    steps:
      - name: Parse command
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"

          # Extract command and environment
          if [[ "$COMMENT" =~ ^/deploy[[:space:]]+(adt|qat|crptrn) ]]; then
            echo "action=deploy" >> $GITHUB_OUTPUT
            echo "environment=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/test[[:space:]]+(adt|qat|crptrn) ]]; then
            echo "action=test" >> $GITHUB_OUTPUT
            echo "environment=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # React to Comment
  # ============================================
  react:
    name: Add Reaction
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.valid == 'true'

    steps:
      - name: Add rocket emoji
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='rocket'
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Trigger Deployment
  # ============================================
  trigger-deploy:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    needs: parse
    if: |
      needs.parse.outputs.valid == 'true' &&
      needs.parse.outputs.action == 'deploy'

    steps:
      - name: Remove stale labels and trigger workflow
        run: |
          ACTION="${{ needs.parse.outputs.action }}"
          ENV="${{ needs.parse.outputs.environment }}"

          WORKFLOW_FILE="ado-pipeline-deploy.yml"
          ACTION_TEXT="Deployment"

          # Remove stale labels before starting deployment
          echo "🗑️ Removing stale labels for $ENV environment..."
          gh pr edit ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --remove-label "deployed:$ENV" 2>/dev/null || echo "Label deployed:$ENV not present"
          gh pr edit ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --remove-label "tested:$ENV" 2>/dev/null || echo "Label tested:$ENV not present"

          gh workflow run "$WORKFLOW_FILE" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f pr_number="${{ github.event.issue.number }}" \
            -f environment="$ENV" \
            -f triggered_by="${{ github.event.comment.user.login }}" \
            -f comment_id="${{ github.event.comment.id }}"

          # Update the original comment with status
          ORIGINAL_BODY="${{ github.event.comment.body }}"
          cat > /tmp/comment.txt <<EOF
          $ORIGINAL_BODY

          ---
          🚀 **$ACTION_TEXT triggered by @${{ github.event.comment.user.login }}**

          **Action:** \`$ACTION\`
          **Environment:** \`$ENV\`

          [View workflow runs →](${{ github.server_url }}/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE)
          EOF

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}" \
            -f body="$(cat /tmp/comment.txt)"
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Trigger Testing
  # ============================================
  trigger-test:
    name: Trigger Testing
    runs-on: ubuntu-latest
    needs: parse
    if: |
      needs.parse.outputs.valid == 'true' &&
      needs.parse.outputs.action == 'test'

    steps:
      - name: Remove stale labels and trigger workflow
        run: |
          ACTION="${{ needs.parse.outputs.action }}"
          ENV="${{ needs.parse.outputs.environment }}"

          WORKFLOW_FILE="ado-pipeline-test.yml"
          ACTION_TEXT="Testing"

          # Remove stale test label before starting
          echo "🗑️ Removing stale test label for $ENV environment..."
          gh pr edit ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --remove-label "tested:$ENV" 2>/dev/null || echo "Label tested:$ENV not present"

          gh workflow run "$WORKFLOW_FILE" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f pr_number="${{ github.event.issue.number }}" \
            -f environment="$ENV" \
            -f triggered_by="${{ github.event.comment.user.login }}" \
            -f comment_id="${{ github.event.comment.id }}"

          # Update the original comment with status
          ORIGINAL_BODY="${{ github.event.comment.body }}"
          cat > /tmp/comment.txt <<EOF
          $ORIGINAL_BODY

          ---
          🚀 **$ACTION_TEXT triggered by @${{ github.event.comment.user.login }}**

          **Action:** \`$ACTION\`
          **Environment:** \`$ENV\`

          [View workflow runs →](${{ github.server_url }}/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE)
          EOF

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}" \
            -f body="$(cat /tmp/comment.txt)"
        env:
          GH_TOKEN: ${{ github.token }}
