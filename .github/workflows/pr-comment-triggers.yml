name: PR Comment Triggers

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

jobs:
  # ============================================
  # Parse PR Comment
  # ============================================
  parse:
    name: Parse Command
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/deploy') || startsWith(github.event.comment.body, '/test'))
    
    outputs:
      valid: ${{ steps.parse.outputs.valid }}
      action: ${{ steps.parse.outputs.action }}
      environment: ${{ steps.parse.outputs.environment }}

    steps:
      - name: Parse command
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"

          # Extract command and environment
          if [[ "$COMMENT" =~ ^/deploy[[:space:]]+(adt|qat|crptrn) ]]; then
            echo "action=deploy" >> $GITHUB_OUTPUT
            echo "environment=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/test[[:space:]]+(adt|qat|crptrn) ]]; then
            echo "action=test" >> $GITHUB_OUTPUT
            echo "environment=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # React to Comment
  # ============================================
  react:
    name: Add Reaction
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.valid == 'true'

    steps:
      - name: Add rocket emoji
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='rocket'
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Trigger Deployment
  # ============================================
  trigger-deploy:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    needs: parse
    if: |
      needs.parse.outputs.valid == 'true' &&
      needs.parse.outputs.action == 'deploy'
    
    outputs:
      workflow_id: ${{ steps.trigger.outputs.workflow_id }}

    steps:
      - name: Remove stale labels and trigger workflow
        id: trigger
        run: |
          ACTION="${{ needs.parse.outputs.action }}"
          ENV="${{ needs.parse.outputs.environment }}"

          WORKFLOW_FILE="ado-pipeline-deploy.yml"
          ACTION_TEXT="Deployment"

          # Remove stale labels before starting deployment
          echo "🗑️ Removing stale labels for $ENV environment..."
          gh pr edit ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --remove-label "deployed:$ENV" 2>/dev/null || echo "Label deployed:$ENV not present"
          gh pr edit ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --remove-label "tested:$ENV" 2>/dev/null || echo "Label tested:$ENV not present"

          gh workflow run "$WORKFLOW_FILE" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f pr_number="${{ github.event.issue.number }}" \
            -f environment="$ENV" \
            -f triggered_by="${{ github.event.comment.user.login }}" \
            -f comment_id="${{ github.event.comment.id }}"

          # Wait a moment for the workflow to appear in the API
          sleep 5
          
          # Get the workflow run ID (most recent run of this workflow)
          WORKFLOW_ID=$(gh run list --repo "${{ github.repository }}" --workflow="$WORKFLOW_FILE" --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "workflow_id=$WORKFLOW_ID" >> $GITHUB_OUTPUT
          echo "📝 Triggered workflow run ID: $WORKFLOW_ID"

          # Update the original comment with status
          ORIGINAL_BODY="${{ github.event.comment.body }}"
          cat > /tmp/comment.txt <<EOF
          $ORIGINAL_BODY

          ---
          🚀 **$ACTION_TEXT triggered by @${{ github.event.comment.user.login }}**

          **Action:** \`$ACTION\`
          **Environment:** \`$ENV\`

          [View workflow runs →](${{ github.server_url }}/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE)
          EOF

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}" \
            -f body="$(cat /tmp/comment.txt)"
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Wait for Deployment to Complete
  # ============================================
  wait-for-deploy:
    name: Wait for Deployment
    runs-on: ubuntu-latest
    needs: [parse, trigger-deploy]
    if: |
      needs.parse.outputs.action == 'deploy' &&
      needs.trigger-deploy.outputs.workflow_id != ''
    
    outputs:
      success: ${{ steps.wait.outputs.success }}

    steps:
      - name: Wait for deploy workflow to complete
        id: wait
        run: |
          WORKFLOW_ID="${{ needs.trigger-deploy.outputs.workflow_id }}"
          echo "⏳ Waiting for workflow run $WORKFLOW_ID to complete..."
          
          # Watch the workflow run (will block until completion)
          gh run watch $WORKFLOW_ID --repo "${{ github.repository }}" || true
          
          # Get the conclusion
          CONCLUSION=$(gh run view $WORKFLOW_ID --repo "${{ github.repository }}" --json conclusion --jq '.conclusion')
          echo "📊 Workflow conclusion: $CONCLUSION"
          
          if [ "$CONCLUSION" = "success" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Trigger Testing
  # ============================================
  trigger-test:
    name: Trigger Testing
    runs-on: ubuntu-latest
    needs: [parse, wait-for-deploy]
    if: |
      always() &&
      needs.parse.outputs.valid == 'true' &&
      (
        (needs.parse.outputs.action == 'test') ||
        (needs.parse.outputs.action == 'deploy' && needs.wait-for-deploy.outputs.success == 'true')
      )

    steps:
      - name: Remove stale labels and trigger workflow
        run: |
          ACTION="${{ needs.parse.outputs.action }}"
          ENV="${{ needs.parse.outputs.environment }}"

          WORKFLOW_FILE="ado-pipeline-test.yml"
          ACTION_TEXT="Testing"

          # Remove stale test label before starting
          echo "🗑️ Removing stale test label for $ENV environment..."
          gh pr edit ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --remove-label "tested:$ENV" 2>/dev/null || echo "Label tested:$ENV not present"

          gh workflow run "$WORKFLOW_FILE" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f pr_number="${{ github.event.issue.number }}" \
            -f environment="$ENV" \
            -f triggered_by="${{ github.event.comment.user.login }}" \
            -f comment_id="${{ github.event.comment.id }}"
          
          # Update the original comment with testing triggered status
          # Sleep to ensure we get latest comment (after deploy might have updated it)
          sleep 2
          ORIGINAL_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}" --jq '.body')
          
          cat > /tmp/comment.txt <<EOF
          $ORIGINAL_BODY

          🚀 **$ACTION_TEXT triggered by @${{ github.event.comment.user.login }}**

          **Action:** \`$ACTION\`
          **Environment:** \`$ENV\`

          [View workflow runs →](${{ github.server_url }}/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE)
          EOF

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}" \
            -f body="$(cat /tmp/comment.txt)"
          
          echo "✅ Test workflow triggered for $ENV environment"
        env:
          GH_TOKEN: ${{ github.token }}
