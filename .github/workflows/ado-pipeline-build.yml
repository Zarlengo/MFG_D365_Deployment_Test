name: Build PR Branch

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (for audit trail)"
        required: false
        type: string
      pr_branch:
        description: "PR branch to checkout and build"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - "adt"
          - "qat"
          - "crptrn"
        default: "qat"
      triggered_by:
        description: "User who triggered this (for audit trail)"
        required: false
        type: string
      comment_id:
        description: "Comment ID to update with results"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build for ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ steps.build.outcome }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.pr_branch }}
          fetch-depth: 0

      - name: Simulate Build
        id: build
        run: |
          ENV_UPPER=$(echo "${{ github.event.inputs.environment }}" | tr '[:lower:]' '[:upper:]')
          echo "🔨 Starting build for $ENV_UPPER environment..."
          echo "⏳ Compiling packages..."
          sleep 30

          # 50% random failure
          if [ $((RANDOM % 2)) -eq 0 ]; then
            echo "✅ $ENV_UPPER build completed successfully"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ $ENV_UPPER build failed"
            exit 1
          fi

  notify-success:
    name: Notify Build Success
    runs-on: ubuntu-latest
    needs: build
    if: |
      always() &&
      needs.build.result == 'success' &&
      github.event.inputs.comment_id != ''

    steps:
      - name: Update comment with success
        run: |
          ENV="${{ github.event.inputs.environment }}"
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')

          # Wait a moment to ensure we get the latest comment
          sleep 2

          # Get the current comment body
          CURRENT_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.inputs.comment_id }}" --jq '.body')

          # Remove the "Build triggered" section (multiline block including preceding ---)
          # Using awk for robust multiline matching
          UPDATED_BODY=$(echo "$CURRENT_BODY" | awk '
            BEGIN { skip=0; buffer="" }
            /^---$/ && !skip { 
              buffer = $0 "\n"
              getline
              if ($0 ~ /^$/) {
                buffer = buffer $0 "\n"
                getline
                if ($0 ~ /🚀 \*\*Build triggered/) {
                  skip = 1
                  buffer = ""
                  next
                } else {
                  printf "%s", buffer
                  print
                }
              } else {
                print "---"
                print
              }
              next
            }
            skip && /View workflow runs/ { skip=0; next }
            !skip { print }
          ')
          
          cat > /tmp/comment.txt <<EOF
          $UPDATED_BODY

          ---

          ✅ **$ENV_UPPER Build Complete**

          - ✅ Build succeeded for $ENV_UPPER

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.inputs.comment_id }}" \
            -f body="$(cat /tmp/comment.txt)"
        env:
          GH_TOKEN: ${{ github.token }}

  notify-failure:
    name: Notify Build Failure
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      needs.build.result == 'failure' &&
      github.event.inputs.comment_id != ''

    steps:
      - name: Update comment with failure
        run: |
          ENV="${{ github.event.inputs.environment }}"
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')

          # Wait a moment to ensure we get the latest comment
          sleep 2

          # Get the current comment body
          CURRENT_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.inputs.comment_id }}" --jq '.body')

          # Remove the "Build triggered" section (multiline block including preceding ---)
          # Using a more robust approach with awk
          UPDATED_BODY=$(echo "$CURRENT_BODY" | awk '
            BEGIN { skip=0; buffer="" }
            /^---$/ && !skip { 
              # Store the --- line in case we dont skip
              buffer = $0 "\n"
              getline
              if ($0 ~ /^$/) {
                buffer = buffer $0 "\n"
                getline
                if ($0 ~ /🚀 \*\*Build triggered/) {
                  skip = 1
                  buffer = ""
                  next
                } else {
                  printf "%s", buffer
                  print
                }
              } else {
                print "---"
                print
              }
              next
            }
            skip && /View workflow runs/ { skip=0; next }
            !skip { print }
          ')

          cat > /tmp/comment.txt <<EOF
          $UPDATED_BODY

          ---

          ❌ **$ENV_UPPER Build Failed**

          - ❌ Build failed for $ENV_UPPER

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.inputs.comment_id }}" \
            -f body="$(cat /tmp/comment.txt)"
        env:
          GH_TOKEN: ${{ github.token }}

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          ENV="${{ github.event.inputs.environment }}"
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')

          echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** $ENV_UPPER" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.triggered_by }}" ]; then
            echo "**Triggered by:** @${{ github.event.inputs.triggered_by }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "- ✅ Build: Success" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.build.result }}" = "failure" ]; then
            echo "- ❌ Build: Failed" >> $GITHUB_STEP_SUMMARY
          fi
