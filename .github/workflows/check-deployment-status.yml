name: Check Deployment Status

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-deployment-requirements:
    name: Verify Deployment Status
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for metadata changes
        id: check_metadata
        run: |
          # Get the base branch (target of the PR)
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Checking for changes in /Metadata directory..."

          # Check if there are any changes in the Metadata folder
          METADATA_CHANGES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep '^Metadata/' || true)

          if [ -z "$METADATA_CHANGES" ]; then
            echo "has_metadata_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No changes in /Metadata folder - deployment not required"
          else
            echo "has_metadata_changes=true" >> $GITHUB_OUTPUT
            echo "📦 Changes detected in /Metadata folder:"
            echo "$METADATA_CHANGES"
          fi

      - name: Check deployment labels
        id: check_labels
        run: |
          # Get PR labels
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')

          echo "Current PR labels:"
          echo "$LABELS"

          # Check for required labels
          HAS_DEPLOYED_QAT=$(echo "$LABELS" | grep -c "^deployed:qat$" || true)
          HAS_DEPLOYED_CRPTRN=$(echo "$LABELS" | grep -c "^deployed:crptrn$" || true)
          HAS_TESTED_QAT=$(echo "$LABELS" | grep -c "^tested:qat$" || true)
          HAS_TESTED_CRPTRN=$(echo "$LABELS" | grep -c "^tested:crptrn$" || true)

          label_count=0
          if [ "$HAS_DEPLOYED_QAT" -gt 0 ]; then
            echo "✅ Deployed in QAT environment - label: deployed:qat"
            label_count=$((label_count + 1))
          else
            echo "❌ Missing deployment labels: deployed:qat"
          fi

          if [ "$HAS_TESTED_QAT" -gt 0 ]; then
            echo "✅ Tested in QAT environment - label: tested:qat"
            label_count=$((label_count + 1))
          else
            echo "❌ Missing required labels: tested:qat"
          fi

          if [ "$HAS_DEPLOYED_CRPTRN" -gt 0 ]; then
            echo "✅ Deployed in CRPTRN environment - label: deployed:crptrn"
            label_count=$((label_count + 1))
          else
            echo "❌ Missing deployment labels: deployed:crptrn"
          fi

          if [ "$HAS_TESTED_CRPTRN" -gt 0 ]; then
            echo "✅ Tested in CRPTRN environment - label: tested:crptrn"
            label_count=$((label_count + 1))
          else
            echo "❌ Missing required labels: tested:crptrn"
          fi

          if [ "$label_count" -eq 4 ]; then
            echo "has_labels=true" >> $GITHUB_OUTPUT
            echo "✅ All deployment and testing labels are present"
          else
            echo "has_labels=false" >> $GITHUB_OUTPUT
            echo "❌ Missing deployment labels"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Determine if PR can be merged
        id: can_merge
        run: |
          HAS_METADATA="${{ steps.check_metadata.outputs.has_metadata_changes }}"
          HAS_LABELS="${{ steps.check_labels.outputs.has_labels }}"

          echo "# Deployment Status Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$HAS_METADATA" = "false" ]; then
            echo "✅ **No metadata changes detected** - deployment and testing not required" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This PR does not modify the \`/Metadata\` folder, so it can be merged without deployment testing." >> $GITHUB_STEP_SUMMARY
            echo "can_merge=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$HAS_LABELS" = "true" ]; then
            echo "✅ **All deployment and testing requirements met**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Deployed in QAT (\`deployed:qat\`)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Tested in QAT (\`tested:qat\`)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Deployed in CRPTRN (\`deployed:crptrn\`)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Tested in CRPTRN (\`tested:crptrn\`)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This PR can be merged." >> $GITHUB_STEP_SUMMARY
            echo "can_merge=true" >> $GITHUB_OUTPUT
          else
            # Get label status for detailed reporting
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')
            
            QAT_DEPLOYED_STATUS="❌"
            [ $(echo "$LABELS" | grep -c "^deployed:qat$" || true) -gt 0 ] && QAT_DEPLOYED_STATUS="✅"
            
            QAT_TESTED_STATUS="❌"
            [ $(echo "$LABELS" | grep -c "^tested:qat$" || true) -gt 0 ] && QAT_TESTED_STATUS="✅"
            
            CRPTRN_DEPLOYED_STATUS="❌"
            [ $(echo "$LABELS" | grep -c "^deployed:crptrn$" || true) -gt 0 ] && CRPTRN_DEPLOYED_STATUS="✅"
            
            CRPTRN_TESTED_STATUS="❌"
            [ $(echo "$LABELS" | grep -c "^tested:crptrn$" || true) -gt 0 ] && CRPTRN_TESTED_STATUS="✅"
            
            echo "❌ **Deployment and testing required**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This PR modifies the \`/Metadata\` folder and must be deployed and tested in QAT and CRPTRN before merging." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Required Labels" >> $GITHUB_STEP_SUMMARY

            echo "- $QAT_DEPLOYED_STATUS Deployed in QAT (\`deployed:qat\`)" >> $GITHUB_STEP_SUMMARY
            echo "- $QAT_TESTED_STATUS Tested in QAT (\`tested:qat\`)" >> $GITHUB_STEP_SUMMARY
            echo "- $CRPTRN_DEPLOYED_STATUS Deployed in CRPTRN (\`deployed:crptrn\`)" >> $GITHUB_STEP_SUMMARY
            echo "- $CRPTRN_TESTED_STATUS Tested in CRPTRN (\`tested:crptrn\`)" >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### How to Deploy" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Comment on this PR with:" >> $GITHUB_STEP_SUMMARY
            echo "- \`/deploy qat\` - Deploy and test in QAT" >> $GITHUB_STEP_SUMMARY
            echo "- \`/deploy crptrn\` - Deploy and test in CRPTRN" >> $GITHUB_STEP_SUMMARY
            
            echo "can_merge=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Post status comment
        if: |
          always() &&
          steps.check_metadata.outputs.has_metadata_changes == 'true' &&
          steps.check_labels.outputs.has_labels == 'false'
        run: |
          # Check if we already posted a comment
          EXISTING_COMMENT=$(gh pr view ${{ github.event.pull_request.number }} \
            --json comments \
            --jq '.comments[] | select(.author.login == "github-actions[bot]" and (.body | contains("Deployment Status Check"))) | .id' \
            | head -1)

          # Check current label status
          HAS_DEPLOYED_QAT=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | grep -c "^deployed:qat$" || true)
          HAS_TESTED_QAT=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | grep -c "^tested:qat$" || true)
          HAS_DEPLOYED_CRPTRN=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | grep -c "^deployed:crptrn$" || true)
          HAS_TESTED_CRPTRN=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | grep -c "^tested:crptrn$" || true)

          QAT_DEPLOYED_STATUS="❌"
          [ "$HAS_DEPLOYED_QAT" -gt 0 ] && QAT_DEPLOYED_STATUS="✅"

          CRPTRN_DEPLOYED_STATUS="❌"
          [ "$HAS_DEPLOYED_CRPTRN" -gt 0 ] && CRPTRN_DEPLOYED_STATUS="✅"

          QAT_TESTED_STATUS="❌"
          [ "$HAS_TESTED_QAT" -gt 0 ] && QAT_TESTED_STATUS="✅"

          CRPTRN_TESTED_STATUS="❌"
          [ "$HAS_TESTED_CRPTRN" -gt 0 ] && CRPTRN_TESTED_STATUS="✅"

          cat > /tmp/comment.md <<EOF
          ## 🚨 Deployment Status Check

          This PR modifies the \`/Metadata\` folder and requires deployment and testing before merging.

          ### Required Deployment
          - $QAT_DEPLOYED_STATUS **QAT** - \`deployed:qat\`
          - $CRPTRN_DEPLOYED_STATUS **CRPTRN** - \`deployed:crptrn\`

          ### Required Testing
          - $QAT_TESTED_STATUS **QAT** - \`tested:qat\`
          - $CRPTRN_TESTED_STATUS **CRPTRN** - \`tested:crptrn\`

          ### How to Deploy
          Comment on this PR with:
          - \`/deploy adt\` - Deploy and tests in ADT [Optional]
          - \`/deploy qat\` - Deploy and tests in QAT [Required]
          - \`/deploy crptrn\` - Deploy and tests in CRPTRN [Required]

          ### How to test an already deployed build
          Comment on this PR with:
          - \`/test adt\` - Tests in ADT [Optional]
          - \`/test qat\` - Tests in QAT [Required]
          - \`/test crptrn\` - Tests in CRPTRN [Required]
          ---
          <sub>This check will automatically update when deployment labels are applied.</sub>
          EOF

          if [ -n "$EXISTING_COMMENT" ]; then
            echo "Updating existing comment..."
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT" \
              --input /tmp/comment.md
          else
            echo "Posting new comment..."
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo "${{ github.repository }}" \
              --body-file /tmp/comment.md
          fi
        env:
          GH_TOKEN: ${{ github.token }}
