name: Check Deployment Status

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-deployment-requirements:
    name: Verify Deployment Status
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for metadata changes
        id: check_metadata
        run: |
          # Get the base branch (target of the PR)
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Checking for changes in /Metadata directory..."

          # Check if there are any changes in the Metadata folder
          METADATA_CHANGES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep '^Metadata/' || true)

          if [ -z "$METADATA_CHANGES" ]; then
            echo "has_metadata_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No changes in /Metadata folder - deployment not required"
          else
            echo "has_metadata_changes=true" >> $GITHUB_OUTPUT
            echo "📦 Changes detected in /Metadata folder:"
            echo "$METADATA_CHANGES"
          fi

      - name: Check deployment labels
        id: check_labels
        run: |
          # Get PR labels
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')

          echo "Current PR labels:"
          echo "$LABELS"

          # Check for required labels
          HAS_QAT=$(echo "$LABELS" | grep -c "^tested:qat$" || true)
          HAS_CRPTRN=$(echo "$LABELS" | grep -c "^tested:crptrn$" || true)

          if [ "$HAS_QAT" -gt 0 ] && [ "$HAS_CRPTRN" -gt 0 ]; then
            echo "has_required_labels=true" >> $GITHUB_OUTPUT
            echo "✅ Both required labels present: tested:qat, tested:crptrn"
          else
            echo "has_required_labels=false" >> $GITHUB_OUTPUT
            echo "❌ Missing required labels:"
            [ "$HAS_QAT" -eq 0 ] && echo "  - tested:qat"
            [ "$HAS_CRPTRN" -eq 0 ] && echo "  - tested:crptrn"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Determine if PR can be merged
        id: can_merge
        run: |
          HAS_METADATA="${{ steps.check_metadata.outputs.has_metadata_changes }}"
          HAS_LABELS="${{ steps.check_labels.outputs.has_required_labels }}"

          echo "# Deployment Status Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$HAS_METADATA" = "false" ]; then
            echo "✅ **No metadata changes detected** - deployment testing not required" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This PR does not modify the \`/Metadata\` folder, so it can be merged without deployment testing." >> $GITHUB_STEP_SUMMARY
            echo "can_merge=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$HAS_LABELS" = "true" ]; then
            echo "✅ **All deployment requirements met**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Tested in QAT (\`tested:qat\`)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Tested in CRPTRN (\`tested:crptrn\`)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This PR can be merged." >> $GITHUB_STEP_SUMMARY
            echo "can_merge=true" >> $GITHUB_OUTPUT
          else
            echo "❌ **Deployment testing required**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This PR modifies the \`/Metadata\` folder and must be tested in QAT and CRPTRN before merging." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Required Labels" >> $GITHUB_STEP_SUMMARY
            
            # Check which labels are missing
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')
            HAS_QAT=$(echo "$LABELS" | grep -c "^tested:qat$" || true)
            HAS_CRPTRN=$(echo "$LABELS" | grep -c "^tested:crptrn$" || true)
            
            if [ "$HAS_QAT" -eq 0 ]; then
              echo "- ❌ \`tested:qat\` - Deploy and test in QAT with \`/deploy qat\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ✅ \`tested:qat\`" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [ "$HAS_CRPTRN" -eq 0 ]; then
              echo "- ❌ \`tested:crptrn\` - Deploy and test in CRPTRN with \`/deploy crptrn\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ✅ \`tested:crptrn\`" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### How to Deploy" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Comment on this PR with:" >> $GITHUB_STEP_SUMMARY
            echo "- \`/deploy qat\` - Deploy and test in QAT" >> $GITHUB_STEP_SUMMARY
            echo "- \`/deploy crptrn\` - Deploy and test in CRPTRN" >> $GITHUB_STEP_SUMMARY
            
            echo "can_merge=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Post status comment
        if: |
          always() &&
          steps.check_metadata.outputs.has_metadata_changes == 'true' &&
          steps.check_labels.outputs.has_required_labels == 'false'
        run: |
          # Check if we already posted a comment
          EXISTING_COMMENT=$(gh pr view ${{ github.event.pull_request.number }} \
            --json comments \
            --jq '.comments[] | select(.author.login == "github-actions[bot]" and (.body | contains("Deployment Status Check"))) | .id' \
            | head -1)

          # Check current label status
          HAS_QAT=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | grep -c "^tested:qat$" || true)
          HAS_CRPTRN=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | grep -c "^tested:crptrn$" || true)

          QAT_STATUS="❌"
          CRPTRN_STATUS="❌"
          [ "$HAS_QAT" -gt 0 ] && QAT_STATUS="✅"
          [ "$HAS_CRPTRN" -gt 0 ] && CRPTRN_STATUS="✅"

          cat > /tmp/comment.md <<EOF
          ## 🚨 Deployment Status Check

          This PR modifies the \`/Metadata\` folder and requires deployment testing before merging.

          ### Required Testing
          - $QAT_STATUS **QAT** - \`tested:qat\`
          - $CRPTRN_STATUS **CRPTRN** - \`tested:crptrn\`

          ### How to Deploy
          Comment on this PR with:
          - \`/deploy adt\` - Deploy and test in ADT [Optional]
          - \`/deploy qat\` - Deploy and test in QAT [Required]
          - \`/deploy crptrn\` - Deploy and test in CRPTRN [Required]

          ---
          <sub>This check will automatically update when deployment labels are applied.</sub>
          EOF

          if [ -n "$EXISTING_COMMENT" ]; then
            echo "Updating existing comment..."
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT" \
              --input /tmp/comment.md
          else
            echo "Posting new comment..."
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo "${{ github.repository }}" \
              --body-file /tmp/comment.md
          fi
        env:
          GH_TOKEN: ${{ github.token }}
