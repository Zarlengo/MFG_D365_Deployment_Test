name: Deploy to Environment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to label (leave empty to skip labeling)"
        required: false
        type: string
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - "adt"
          - "qat"
          - "crptrn"
        default: "qat"
      triggered_by:
        description: "User who triggered this (for audit trail)"
        required: false
        type: string
      comment_id:
        description: "Comment ID to update with results"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      deployment_status: ${{ steps.deploy.outcome }}

    steps:
      - name: Simulate Deployment
        id: deploy
        run: |
          echo "🚀 Starting deployment to ${{ github.event.inputs.environment }} environment..."
          echo "⏳ Deploying packages..."
          sleep 30

          # 50% random failure
          if [ $((RANDOM % 2)) -eq 0 ]; then
            echo "✅ ${{ github.event.inputs.environment }} deployment completed successfully"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ ${{ github.event.inputs.environment }} deployment failed"
            exit 1
          fi

  label:
    name: Label ${{ github.event.inputs.environment }} Success
    runs-on: ubuntu-latest
    needs: [deploy]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      github.event.inputs.pr_number != ''

    steps:
      - name: Add labels
        run: |
          echo "🏷️ Adding ${{ github.event.inputs.environment }} success labels to PR #${{ github.event.inputs.pr_number }}"

          gh pr edit ${{ github.event.inputs.pr_number }} \
            --repo "${{ github.repository }}" \
            --add-label "deployed:${{ github.event.inputs.environment }},tested:${{ github.event.inputs.environment }}"

          # Update the original comment if comment_id provided
          if [ -n "${{ github.event.inputs.comment_id }}" ]; then
            # Get the current comment body
            CURRENT_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.inputs.comment_id }}" --jq '.body')
            
            cat > /tmp/comment.txt <<EOF
          $CURRENT_BODY

          ✅ **${{ github.event.inputs.environment | upper }} Deployment & Testing Complete**

          - ✅ Deployed to ${{ github.event.inputs.environment | upper }}
          - ✅ Tests passed in ${{ github.event.inputs.environment | upper }}
          - 🏷️ Labels \`deployed:${{ github.event.inputs.environment }}\` and \`tested:${{ github.event.inputs.environment }}\` added

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
            
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/issues/comments/${{ github.event.inputs.comment_id }}" \
              -f body="$(cat /tmp/comment.txt)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Summary Job
  # ============================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy, label]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# Deployment & Testing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.triggered_by }}" ]; then
            echo "**Triggered by:** @${{ github.event.inputs.triggered_by }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ENV="${{ github.event.inputs.environment }}"

          echo "### ${ENV^} Environment" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "- ✅ Deployment: Success" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "- ❌ Deployment: Failed" >> $GITHUB_STEP_SUMMARY
          fi
