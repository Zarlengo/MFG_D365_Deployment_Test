name: Deploy to Environment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to label (leave empty to skip labeling)"
        required: false
        type: string
      pr_branch:
        description: "PR branch to checkout and deploy"
        required: true
        type: string
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - "adt"
          - "qat"
          - "crptrn"
        default: "qat"
      pipeline_id:
        description: "ADO Pipeline ID to trigger"
        required: true
        type: string
      triggered_by:
        description: "User who triggered this (for audit trail)"
        required: false
        type: string
      comment_id:
        description: "Comment ID to update with results"
        required: false
        type: string
  
  workflow_call:
    inputs:
      pr_number:
        description: "PR number to label (leave empty to skip labeling)"
        required: false
        type: string
      pr_branch:
        description: "PR branch to checkout and deploy"
        required: true
        type: string
      environment:
        description: "Environment to deploy"
        required: true
        type: string
      pipeline_id:
        description: "ADO Pipeline ID to trigger"
        required: true
        type: string
      triggered_by:
        description: "User who triggered this (for audit trail)"
        required: false
        type: string
      comment_id:
        description: "Comment ID to update with results"
        required: false
        type: string
    secrets:
      ADO_PAT:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      deployment_status: ${{ steps.deploy.outcome }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.pr_branch }}
          fetch-depth: 0
      
      - name: Get PR info
        id: pr_info
        if: inputs.pr_number != ''
        run: |
          PR_DATA=$(gh pr view ${{ inputs.pr_number }} --json title,url)
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
          PR_URL=$(echo "$PR_DATA" | jq -r '.url')
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger ADO Deployment Pipeline
        id: deploy
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          PR_TITLE: ${{ steps.pr_info.outputs.pr_title }}
          PR_URL: ${{ steps.pr_info.outputs.pr_url }}
          YAML_BRANCH: ${{ inputs.yaml_branch }}
        run: |
          ENV_UPPER=$(echo "${{ inputs.environment }}" | tr '[:lower:]' '[:upper:]')
          echo "🚀 Triggering $ENV_UPPER deployment pipeline (ID: ${{ inputs.pipeline_id }})..."
          
          # Trim whitespace from PAT
          ADO_PAT=$(echo "$ADO_PAT" | tr -d '[:space:]')
          
          # Build parameters JSON (using env vars to avoid bash escaping issues)
          if [ -n "$YAML_BRANCH" ]; then
            # Include resources section to override YAML branch
            PARAMS=$(jq -n \
              --arg yamlBranch "$YAML_BRANCH" \
              --arg branch "${{ inputs.pr_branch }}" \
              --arg env "${{ inputs.environment }}" \
              --arg prNum "${{ inputs.pr_number }}" \
              --arg prTitle "$PR_TITLE" \
              --arg prUrl "$PR_URL" \
              --arg triggeredBy "${{ inputs.triggered_by || github.actor }}" \
              '{
                resources: {
                  repositories: {
                    self: {
                      refName: ("refs/heads/" + $yamlBranch)
                    }
                  }
                },
                templateParameters: {
                  sourceBranch: $branch,
                  environment: $env,
                  prNumber: $prNum,
                  prTitle: $prTitle,
                  prUrl: $prUrl,
                  triggeredBy: $triggeredBy
                }
              }')
          else
            # Use pipeline default branch
            PARAMS=$(jq -n \
              --arg branch "${{ inputs.pr_branch }}" \
              --arg env "${{ inputs.environment }}" \
              --arg prNum "${{ inputs.pr_number }}" \
              --arg prTitle "$PR_TITLE" \
              --arg prUrl "$PR_URL" \
              --arg triggeredBy "${{ inputs.triggered_by || github.actor }}" \
              '{
                templateParameters: {
                  sourceBranch: $branch,
                  environment: $env,
                  prNumber: $prNum,
                  prTitle: $prTitle,
                  prUrl: $prUrl,
                  triggeredBy: $triggeredBy
                }
              }')
          fi
          
          # Trigger the pipeline
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -u ":$ADO_PAT" \
            "https://dev.azure.com/CostcoWholesale/Manufacturing/_apis/pipelines/${{ inputs.pipeline_id }}/runs?api-version=7.0" \
            -H "Content-Type: application/json" \
            -d "$PARAMS")
          
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          
          echo "HTTP Status: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Failed to trigger pipeline (HTTP $HTTP_STATUS)"
            echo "Response:"
            echo "$BODY"
            if [ -n "$BODY" ]; then
              echo "$BODY" | jq '.' 2>/dev/null || echo "$BODY"
            fi
            exit 1
          fi
          
          RUN_ID=$(echo "$BODY" | jq -r '.id')
          if [ "$RUN_ID" = "null" ] || [ -z "$RUN_ID" ]; then
            echo "❌ Failed to get run ID from response"
            echo "Response:"
            echo "$BODY" | jq '.'
            exit 1
          fi
          
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "✅ Pipeline triggered successfully (Run ID: $RUN_ID)"
          echo "🔗 https://dev.azure.com/CostcoWholesale/Manufacturing/_build/results?buildId=$RUN_ID"

      - name: Wait for Pipeline Completion
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: |
          RUN_ID="${{ steps.deploy.outputs.run_id }}"
          echo "⏳ Waiting for pipeline $RUN_ID to complete..."
          
          # Base64 encode PAT for Basic auth
          AUTH=$(echo -n ":$ADO_PAT" | base64)
          
          MAX_WAIT=7200  # 2 hours
          ELAPSED=0
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            sleep 30
            ELAPSED=$((ELAPSED + 30))
            
            STATUS_RESPONSE=$(curl -s \
              "https://dev.azure.com/CostcoWholesale/Manufacturing/_apis/build/builds/$RUN_ID?api-version=7.0" \
              -H "Authorization: Basic $AUTH")
            
            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status')
            RESULT=$(echo "$STATUS_RESPONSE" | jq -r '.result')
            
            echo "Status: $STATUS, Result: $RESULT (${ELAPSED}s elapsed)"
            
            if [ "$STATUS" = "completed" ]; then
              if [ "$RESULT" = "succeeded" ]; then
                echo "✅ Pipeline completed successfully"
                echo "status=success" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "❌ Pipeline failed with result: $RESULT"
                exit 1
              fi
            fi
          done
          
          echo "⏰ Pipeline timed out after $MAX_WAIT seconds"
          exit 1

  label:
    name: Label ${{ inputs.environment }} Success
    runs-on: ubuntu-latest
    needs: [deploy]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      inputs.pr_number != ''

    steps:
      - name: Add labels
        run: |
          ENV="${{ inputs.environment }}"
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')

          echo "🏷️ Adding $ENV success labels to PR #${{ inputs.pr_number }}"

          gh pr edit ${{ inputs.pr_number }} \
            --repo "${{ github.repository }}" \
            --add-label "deployed:$ENV"

          # Update the original comment if comment_id provided
          if [ -n "${{ inputs.comment_id }}" ]; then
            # Get the current comment body
            CURRENT_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/${{ inputs.comment_id }}" --jq '.body')
            
            # Remove the "Deployment triggered" section (multiline block including preceding ---)
            # Using awk for robust multiline matching
            UPDATED_BODY=$(echo "$CURRENT_BODY" | awk '
              BEGIN { skip=0; buffer="" }
              /^---$/ && !skip { 
                buffer = $0 "\n"
                getline
                if ($0 ~ /^$/) {
                  buffer = buffer $0 "\n"
                  getline
                  if ($0 ~ /🚀 \*\*Deployment triggered/) {
                    skip = 1
                    buffer = ""
                    next
                  } else {
                    printf "%s", buffer
                    print
                  }
                } else {
                  print "---"
                  print
                }
                next
              }
              skip && /View workflow runs/ { skip=0; next }
              !skip { print }
            ')
            
            cat > /tmp/comment.txt <<EOF
          $UPDATED_BODY

          ---

          ✅ **$ENV_UPPER Deployment Complete**

          - ✅ Deployed to $ENV_UPPER
          - 🏷️ Label \`deployed:$ENV\` added

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
            
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/issues/comments/${{ inputs.comment_id }}" \
              -f body="$(cat /tmp/comment.txt)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  notify-failure:
    name: Notify Deployment Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: |
      always() &&
      needs.deploy.result == 'failure' &&
      inputs.comment_id != ''

    steps:
      - name: Update comment with failure
        run: |
          ENV="${{ inputs.environment }}"
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')

          # Wait a moment to ensure we get the latest comment
          sleep 2

          # Get the current comment body
          CURRENT_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/${{ inputs.comment_id }}" --jq '.body')

          # Remove the "Deployment triggered" section (multiline block including preceding ---)
          # Using a more robust approach with awk
          UPDATED_BODY=$(echo "$CURRENT_BODY" | awk '
            BEGIN { skip=0; buffer="" }
            /^---$/ && !skip { 
              # Store the --- line in case we dont skip
              buffer = $0 "\n"
              getline
              if ($0 ~ /^$/) {
                buffer = buffer $0 "\n"
                getline
                if ($0 ~ /🚀 \*\*Deployment triggered/) {
                  skip = 1
                  buffer = ""
                  next
                } else {
                  printf "%s", buffer
                  print
                }
              } else {
                print "---"
                print
              }
              next
            }
            skip && /View workflow runs/ { skip=0; next }
            !skip { print }
          ')

          cat > /tmp/comment.txt <<EOF
          $UPDATED_BODY

          ---

          ❌ **$ENV_UPPER Deployment Failed**

          - ❌ Deployment to $ENV_UPPER failed

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ inputs.comment_id }}" \
            -f body="$(cat /tmp/comment.txt)"
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Summary Job
  # ============================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy, label]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.triggered_by }}" ]; then
            echo "**Triggered by:** @${{ inputs.triggered_by }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ENV="${{ inputs.environment }}"

          echo "### ${ENV^} Environment" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "- ✅ Deployment: Success" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "- ❌ Deployment: Failed" >> $GITHUB_STEP_SUMMARY
          fi

