name: Deploy to Environment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to label (leave empty to skip labeling)"
        required: false
        type: string
      pr_branch:
        description: "PR branch to checkout and deploy"
        required: true
        type: string
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - "adt"
          - "qat"
          - "crptrn"
        default: "qat"
      triggered_by:
        description: "User who triggered this (for audit trail)"
        required: false
        type: string
      comment_id:
        description: "Comment ID to update with results"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      deployment_status: ${{ steps.deploy.outcome }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.pr_branch }}
          fetch-depth: 0

      - name: Simulate Deployment
        id: deploy
        run: |
          echo "🚀 Starting deployment to ${{ github.event.inputs.environment }} environment..."
          echo "⏳ Deploying packages..."
          sleep 30

          # 50% random failure
          if [ $((RANDOM % 2)) -eq 0 ]; then
            echo "✅ ${{ github.event.inputs.environment }} deployment completed successfully"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ ${{ github.event.inputs.environment }} deployment failed"
            exit 1
          fi

  label:
    name: Label ${{ github.event.inputs.environment }} Success
    runs-on: ubuntu-latest
    needs: [deploy]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      github.event.inputs.pr_number != ''

    steps:
      - name: Add labels
        run: |
          ENV="${{ github.event.inputs.environment }}"
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')

          echo "🏷️ Adding $ENV success labels to PR #${{ github.event.inputs.pr_number }}"

          gh pr edit ${{ github.event.inputs.pr_number }} \
            --repo "${{ github.repository }}" \
            --add-label "deployed:$ENV"

          # Update the original comment if comment_id provided
          if [ -n "${{ github.event.inputs.comment_id }}" ]; then
            # Get the current comment body
            CURRENT_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.inputs.comment_id }}" --jq '.body')
            
            # Remove the "Deployment triggered" section (multiline block including preceding ---)
            # Using awk for robust multiline matching
            UPDATED_BODY=$(echo "$CURRENT_BODY" | awk '
              BEGIN { skip=0; buffer="" }
              /^---$/ && !skip { 
                buffer = $0 "\n"
                getline
                if ($0 ~ /^$/) {
                  buffer = buffer $0 "\n"
                  getline
                  if ($0 ~ /🚀 \*\*Deployment triggered/) {
                    skip = 1
                    buffer = ""
                    next
                  } else {
                    printf "%s", buffer
                    print
                  }
                } else {
                  print "---"
                  print
                }
                next
              }
              skip && /View workflow runs/ { skip=0; next }
              !skip { print }
            ')
            
            cat > /tmp/comment.txt <<EOF
          $UPDATED_BODY

          ---

          ✅ **$ENV_UPPER Deployment Complete**

          - ✅ Deployed to $ENV_UPPER
          - 🏷️ Label \`deployed:$ENV\` added

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
            
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/issues/comments/${{ github.event.inputs.comment_id }}" \
              -f body="$(cat /tmp/comment.txt)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  notify-failure:
    name: Notify Deployment Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: |
      always() &&
      needs.deploy.result == 'failure' &&
      github.event.inputs.comment_id != ''

    steps:
      - name: Update comment with failure
        run: |
          ENV="${{ github.event.inputs.environment }}"
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')

          # Wait a moment to ensure we get the latest comment
          sleep 2

          # Get the current comment body
          CURRENT_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.inputs.comment_id }}" --jq '.body')

          # Remove the "Deployment triggered" section (multiline block including preceding ---)
          # Using a more robust approach with awk
          UPDATED_BODY=$(echo "$CURRENT_BODY" | awk '
            BEGIN { skip=0; buffer="" }
            /^---$/ && !skip { 
              # Store the --- line in case we dont skip
              buffer = $0 "\n"
              getline
              if ($0 ~ /^$/) {
                buffer = buffer $0 "\n"
                getline
                if ($0 ~ /🚀 \*\*Deployment triggered/) {
                  skip = 1
                  buffer = ""
                  next
                } else {
                  printf "%s", buffer
                  print
                }
              } else {
                print "---"
                print
              }
              next
            }
            skip && /View workflow runs/ { skip=0; next }
            !skip { print }
          ')

          cat > /tmp/comment.txt <<EOF
          $UPDATED_BODY

          ---

          ❌ **$ENV_UPPER Deployment Failed**

          - ❌ Deployment to $ENV_UPPER failed

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.inputs.comment_id }}" \
            -f body="$(cat /tmp/comment.txt)"
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Summary Job
  # ============================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy, label]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.triggered_by }}" ]; then
            echo "**Triggered by:** @${{ github.event.inputs.triggered_by }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ENV="${{ github.event.inputs.environment }}"

          echo "### ${ENV^} Environment" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "- ✅ Deployment: Success" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "- ❌ Deployment: Failed" >> $GITHUB_STEP_SUMMARY
          fi
