name: Reusable Trigger and Wait

on:
  workflow_call:
    inputs:
      workflow_file:
        description: "Workflow file to trigger (e.g., ado-pipeline-build.yml)"
        required: true
        type: string
      workflow_name:
        description: "Human-readable workflow name (e.g., Build, Deployment, Testing)"
        required: true
        type: string
      pr_number:
        description: "PR number"
        required: true
        type: string
      pr_branch:
        description: "PR branch to process"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: string
      triggered_by:
        description: "User who triggered this"
        required: true
        type: string
      comment_id:
        description: "Comment ID to update"
        required: true
        type: string
      remove_labels:
        description: "Comma-separated list of labels to remove before triggering"
        required: false
        type: string
        default: ""
      timeout_minutes:
        description: "Timeout in minutes for waiting"
        required: false
        type: number
        default: 420
    outputs:
      success:
        description: "Whether the workflow completed successfully"
        value: ${{ jobs.wait.outputs.success }}

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  trigger:
    name: Trigger ${{ inputs.workflow_name }}
    runs-on: ubuntu-latest
    outputs:
      workflow_id: ${{ steps.trigger.outputs.workflow_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Remove stale labels and trigger workflow
        id: trigger
        run: |
          ENV="${{ inputs.environment }}"
          PR_NUMBER="${{ inputs.pr_number }}"
          WORKFLOW_FILE="${{ inputs.workflow_file }}"
          WORKFLOW_NAME="${{ inputs.workflow_name }}"
          REMOVE_LABELS="${{ inputs.remove_labels }}"

          # Remove stale labels if specified
          if [ -n "$REMOVE_LABELS" ]; then
            echo "🗑️ Removing stale labels for $ENV environment..."
            IFS=',' read -ra LABELS <<< "$REMOVE_LABELS"
            for label in "${LABELS[@]}"; do
              label=$(echo "$label" | xargs) # trim whitespace
              gh pr edit "$PR_NUMBER" \
                --repo "${{ github.repository }}" \
                --remove-label "$label" 2>/dev/null || echo "Label $label not present"
            done
          fi

          # Trigger the workflow
          gh workflow run "$WORKFLOW_FILE" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f pr_number="${{ inputs.pr_number }}" \
            -f pr_branch="${{ inputs.pr_branch }}" \
            -f environment="$ENV" \
            -f triggered_by="${{ inputs.triggered_by }}" \
            -f comment_id="${{ inputs.comment_id }}"

          # Wait for the workflow to appear in the API
          sleep 5

          # Get the workflow run ID
          WORKFLOW_ID=$(gh run list --repo "${{ github.repository }}" --workflow="$WORKFLOW_FILE" --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "workflow_id=$WORKFLOW_ID" >> $GITHUB_OUTPUT
          echo "📝 Triggered $WORKFLOW_NAME workflow run ID: $WORKFLOW_ID"

          # Update the original comment with status
          ORIGINAL_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/${{ inputs.comment_id }}" --jq '.body')
          
          cat > /tmp/comment.txt <<EOF
          $ORIGINAL_BODY

          ---

          🚀 **$WORKFLOW_NAME triggered for \`$ENV\`**

          [View workflow runs →](${{ github.server_url }}/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE)
          EOF

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ inputs.comment_id }}" \
            -f body="$(cat /tmp/comment.txt)"
        env:
          GH_TOKEN: ${{ github.token }}

  wait:
    name: Wait for ${{ inputs.workflow_name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    needs: trigger
    outputs:
      success: ${{ steps.wait.outputs.success }}

    steps:
      - name: Wait for workflow to complete
        id: wait
        run: |
          WORKFLOW_ID="${{ needs.trigger.outputs.workflow_id }}"
          
          if [ -z "$WORKFLOW_ID" ]; then
            echo "❌ No workflow ID provided"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "⏳ Waiting for ${{ inputs.workflow_name }} workflow run $WORKFLOW_ID to complete..."

          # Watch the workflow run (will block until completion)
          gh run watch $WORKFLOW_ID --repo "${{ github.repository }}" || true

          # Get the conclusion
          CONCLUSION=$(gh run view $WORKFLOW_ID --repo "${{ github.repository }}" --json conclusion --jq '.conclusion')
          echo "📊 Workflow conclusion: $CONCLUSION"

          if [ "$CONCLUSION" = "success" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "✅ ${{ inputs.workflow_name }} completed successfully"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ ${{ inputs.workflow_name }} failed"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
