name: Deploy & Test Environments

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to label (leave empty to skip labeling)'
        required: false
        type: string
      environment:
        description: 'Environment to deploy/test'
        required: true
        type: choice
        options:
          - 'adt'
          - 'qat'
          - 'crptrn'
        default: 'qat'
      mode:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - 'deploy'
          - 'test'
        default: 'deploy'
      triggered_by:
        description: 'User who triggered this (for audit trail)'
        required: false
        type: string

jobs:
  # ============================================
  # ADT Environment
  # ============================================
  deploy-adt:
    name: Deploy to ADT
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.environment == 'adt' &&
      github.event.inputs.mode == 'deploy'
    outputs:
      deployment_status: ${{ steps.deploy.outcome }}
      
    steps:
      - name: Simulate ADT Deployment
        id: deploy
        run: |
          echo "🚀 Starting deployment to ADT environment..."
          echo "⏳ Deploying packages..."
          sleep 30
          
          # 50% random failure
          if [ $((RANDOM % 2)) -eq 0 ]; then
            echo "✅ ADT deployment completed successfully"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ ADT deployment failed"
            exit 1
          fi

  test-adt:
    name: Test in ADT
    runs-on: ubuntu-latest
    needs: deploy-adt
    if: |
      always() &&
      github.event.inputs.environment == 'adt' &&
      (github.event.inputs.mode == 'test' || needs.deploy-adt.result == 'success')
    outputs:
      test_status: ${{ steps.test.outcome }}
      
    steps:
      - name: Simulate ADT Testing
        id: test
        run: |
          echo "🧪 Starting tests in ADT environment..."
          echo "⏳ Running test suite..."
          sleep 30
          
          # 50% random failure
          if [ $((RANDOM % 2)) -eq 0 ]; then
            echo "✅ ADT tests passed"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ ADT tests failed"
            exit 1
          fi

  label-adt:
    name: Label ADT Success
    runs-on: ubuntu-latest
    needs: [deploy-adt, test-adt]
    if: |
      always() &&
      github.event.inputs.environment == 'adt' &&
      needs.test-adt.result == 'success' &&
      github.event.inputs.pr_number != ''
    
    steps:
      - name: Add ADT labels
        run: |
          echo "🏷️ Adding ADT success labels to PR #${{ github.event.inputs.pr_number }}"
          
          LABELS="tested:adt"
          MESSAGE="- ✅ Tests passed in ADT"
          
          # Only add deployed label if we actually deployed (not test-only mode)
          if [ "${{ github.event.inputs.mode }}" = "deploy" ]; then
            LABELS="deployed:adt,tested:adt"
          fi
          
          gh pr edit ${{ github.event.inputs.pr_number }} \
            --repo "${{ github.repository }}" \
            --add-label "$LABELS"
          
          if [ "${{ github.event.inputs.mode }}" = "deploy" ]; then
            cat > /tmp/comment.txt <<EOF
          ✅ **ADT Deployment & Testing Complete**
          
          - ✅ Deployed to ADT
          - ✅ Tests passed in ADT
          
          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          else
            cat > /tmp/comment.txt <<EOF
          ✅ **ADT Testing Complete**
          
          - ✅ Tests passed in ADT
          
          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          fi
          
          gh pr comment ${{ github.event.inputs.pr_number }} \
            --repo "${{ github.repository }}" \
            --body-file /tmp/comment.txt
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # QAT Environment
  # ============================================
  deploy-qat:
    name: Deploy to QAT
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.environment == 'qat' &&
      github.event.inputs.mode == 'deploy'
    outputs:
      deployment_status: ${{ steps.deploy.outcome }}
      
    steps:
      - name: Simulate QAT Deployment
        id: deploy
        run: |
          echo "🚀 Starting deployment to QAT environment..."
          echo "⏳ Deploying packages..."
          sleep 30
          
          # 50% random failure
          if [ $((RANDOM % 2)) -eq 0 ]; then
            echo "✅ QAT deployment completed successfully"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ QAT deployment failed"
            exit 1
          fi

  test-qat:
    name: Test in QAT
    runs-on: ubuntu-latest
    needs: deploy-qat
    if: |
      always() &&
      github.event.inputs.environment == 'qat' &&
      (github.event.inputs.mode == 'test' || needs.deploy-qat.result == 'success')
    outputs:
      test_status: ${{ steps.test.outcome }}
      
    steps:
      - name: Simulate QAT Testing
        id: test
        run: |
          echo "🧪 Starting tests in QAT environment..."
          echo "⏳ Running test suite..."
          sleep 30
          
          # 50% random failure
          if [ $((RANDOM % 2)) -eq 0 ]; then
            echo "✅ QAT tests passed"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ QAT tests failed"
            exit 1
          fi

  label-qat:
    name: Label QAT Success
    runs-on: ubuntu-latest
    needs: [deploy-qat, test-qat]
    if: |
      always() &&
      github.event.inputs.environment == 'qat' &&
      needs.test-qat.result == 'success' &&
      github.event.inputs.pr_number != ''
    
    steps:
      - name: Add QAT labels
        run: |
          echo "🏷️ Adding QAT success labels to PR #${{ github.event.inputs.pr_number }}"
          
          LABELS="tested:qat"
          
          # Only add deployed label if we actually deployed (not test-only mode)
          if [ "${{ github.event.inputs.mode }}" = "deploy" ]; then
            LABELS="deployed:qat,tested:qat"
          fi
          
          gh pr edit ${{ github.event.inputs.pr_number }} \
            --repo "${{ github.repository }}" \
            --add-label "$LABELS"
          
          if [ "${{ github.event.inputs.mode }}" = "deploy" ]; then
            cat > /tmp/comment.txt <<EOF
          ✅ **QAT Deployment & Testing Complete**
          
          - ✅ Deployed to QAT
          - ✅ Tests passed in QAT
          
          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          else
            cat > /tmp/comment.txt <<EOF
          ✅ **QAT Testing Complete**
          
          - ✅ Tests passed in QAT
          
          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          fi
          
          gh pr comment ${{ github.event.inputs.pr_number }} \
            --repo "${{ github.repository }}" \
            --body-file /tmp/comment.txt
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # CRPTRN Environment
  # ============================================
  deploy-crptrn:
    name: Deploy to CRPTRN
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.environment == 'crptrn' &&
      github.event.inputs.mode == 'deploy'
    outputs:
      deployment_status: ${{ steps.deploy.outcome }}
      
    steps:
      - name: Simulate CRPTRN Deployment
        id: deploy
        run: |
          echo "🚀 Starting deployment to CRPTRN environment..."
          echo "⏳ Deploying packages..."
          sleep 30
          
          # 50% random failure
          if [ $((RANDOM % 2)) -eq 0 ]; then
            echo "✅ CRPTRN deployment completed successfully"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ CRPTRN deployment failed"
            exit 1
          fi

  test-crptrn:
    name: Test in CRPTRN
    runs-on: ubuntu-latest
    needs: deploy-crptrn
    if: |
      always() &&
      github.event.inputs.environment == 'crptrn' &&
      (github.event.inputs.mode == 'test' || needs.deploy-crptrn.result == 'success')
    outputs:
      test_status: ${{ steps.test.outcome }}
      
    steps:
      - name: Simulate CRPTRN Testing
        id: test
        run: |
          echo "🧪 Starting tests in CRPTRN environment..."
          echo "⏳ Running test suite..."
          sleep 30
          
          # 50% random failure
          if [ $((RANDOM % 2)) -eq 0 ]; then
            echo "✅ CRPTRN tests passed"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ CRPTRN tests failed"
            exit 1
          fi

  label-crptrn:
    name: Label CRPTRN Success
    runs-on: ubuntu-latest
    needs: [deploy-crptrn, test-crptrn]
    if: |
      always() &&
      github.event.inputs.environment == 'crptrn' &&
      needs.test-crptrn.result == 'success' &&
      github.event.inputs.pr_number != ''
    
    steps:
      - name: Add CRPTRN labels
        run: |
          echo "🏷️ Adding CRPTRN success labels to PR #${{ github.event.inputs.pr_number }}"
          
          LABELS="tested:crptrn"
          
          # Only add deployed label if we actually deployed (not test-only mode)
          if [ "${{ github.event.inputs.mode }}" = "deploy" ]; then
            LABELS="deployed:crptrn,tested:crptrn"
          fi
          
          gh pr edit ${{ github.event.inputs.pr_number }} \
            --repo "${{ github.repository }}" \
            --add-label "$LABELS"
          
          if [ "${{ github.event.inputs.mode }}" = "deploy" ]; then
            cat > /tmp/comment.txt <<EOF
          ✅ **CRPTRN Deployment & Testing Complete**
          
          - ✅ Deployed to CRPTRN
          - ✅ Tests passed in CRPTRN
          
          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          else
            cat > /tmp/comment.txt <<EOF
          ✅ **CRPTRN Testing Complete**
          
          - ✅ Tests passed in CRPTRN
          
          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          fi
          
          gh pr comment ${{ github.event.inputs.pr_number }} \
            --repo "${{ github.repository }}" \
            --body-file /tmp/comment.txt
        env:
          GH_TOKEN: ${{ github.token }}

  # ============================================
  # Summary Job
  # ============================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-adt, test-adt, label-adt, deploy-qat, test-qat, label-qat, deploy-crptrn, test-crptrn, label-crptrn]
    if: always()
    
    steps:
      - name: Generate Summary
        run: |
          echo "# Deployment & Testing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ github.event.inputs.mode }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.triggered_by }}" ]; then
            echo "**Triggered by:** @${{ github.event.inputs.triggered_by }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Only show summary for the selected environment
          ENV="${{ github.event.inputs.environment }}"
          
          if [ "$ENV" = "adt" ]; then
            echo "### ADT Environment" >> $GITHUB_STEP_SUMMARY
          
            if [ "${{ needs.deploy-adt.result }}" = "success" ]; then
              echo "- ✅ Deployment: Success" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.deploy-adt.result }}" = "failure" ]; then
              echo "- ❌ Deployment: Failed" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.deploy-adt.result }}" = "skipped" ]; then
              echo "- ⏭️ Deployment: Skipped (test-only mode)" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [ "${{ needs.test-adt.result }}" = "success" ]; then
              echo "- ✅ Testing: Success" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.test-adt.result }}" = "failure" ]; then
              echo "- ❌ Testing: Failed" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.test-adt.result }}" = "skipped" ]; then
              echo "- ⏭️ Testing: Skipped (deployment failed)" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "$ENV" = "qat" ]; then
            echo "### QAT Environment" >> $GITHUB_STEP_SUMMARY
            
            if [ "${{ needs.deploy-qat.result }}" = "success" ]; then
              echo "- ✅ Deployment: Success" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.deploy-qat.result }}" = "failure" ]; then
              echo "- ❌ Deployment: Failed" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.deploy-qat.result }}" = "skipped" ]; then
              echo "- ⏭️ Deployment: Skipped (test-only mode)" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [ "${{ needs.test-qat.result }}" = "success" ]; then
              echo "- ✅ Testing: Success" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.test-qat.result }}" = "failure" ]; then
              echo "- ❌ Testing: Failed" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.test-qat.result }}" = "skipped" ]; then
              echo "- ⏭️ Testing: Skipped (deployment failed)" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "$ENV" = "crptrn" ]; then
            echo "### CRPTRN Environment" >> $GITHUB_STEP_SUMMARY
            
            if [ "${{ needs.deploy-crptrn.result }}" = "success" ]; then
              echo "- ✅ Deployment: Success" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.deploy-crptrn.result }}" = "failure" ]; then
              echo "- ❌ Deployment: Failed" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.deploy-crptrn.result }}" = "skipped" ]; then
              echo "- ⏭️ Deployment: Skipped (test-only mode)" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [ "${{ needs.test-crptrn.result }}" = "success" ]; then
              echo "- ✅ Testing: Success" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.test-crptrn.result }}" = "failure" ]; then
              echo "- ❌ Testing: Failed" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.test-crptrn.result }}" = "skipped" ]; then
              echo "- ⏭️ Testing: Skipped (deployment failed)" >> $GITHUB_STEP_SUMMARY
            fi
          fi
