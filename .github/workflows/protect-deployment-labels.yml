name: Protect Labels

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check if label was added by automation
        run: |
          echo "Label '${{ github.event.label.name }}' was added by: ${{ github.actor }}"

          # Allow github-actions bot to add labels
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "✅ Label added by automation - allowed"
            exit 0
          fi

          # Remove manually-added labels
          echo "❌ Labels can only be added by automation"
          echo "Removing label: ${{ github.event.label.name }}"

          gh pr edit ${{ github.event.pull_request.number }} \
            --remove-label "${{ github.event.label.name }}" \
            --repo "${{ github.repository }}"

          cat > /tmp/comment.txt <<EOF
          ⚠️ **Labels are protected**

          The label \`${{ github.event.label.name }}\` was automatically removed.

          Deployment and testing status labels are managed by automation and cannot be manually applied.

          **To trigger deployments/tests:**
          - Use PR comments: \`/deploy adt\`, \`/test qat\`, etc.
          - Status labels will be auto-added on success
          EOF

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --body-file /tmp/comment.txt

          echo "✅ Protected label removed successfully"
        env:
          GH_TOKEN: ${{ github.token }}
