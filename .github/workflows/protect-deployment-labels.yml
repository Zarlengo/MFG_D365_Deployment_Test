name: Protect Deployment Labels

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-deployment-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check if label was added by automation
        run: |
          echo "Label '${{ github.event.label.name }}' was added by: ${{ github.actor }}"
          
          # Allow github-actions bot to add deployment labels
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "✅ Label added by automation - allowed"
            exit 0
          fi
          
          # Remove manually-added deployment labels
          echo "❌ Deployment labels can only be added by automation"
          echo "Removing label: ${{ github.event.label.name }}"
          
          gh pr edit ${{ github.event.pull_request.number }} \
            --remove-label "${{ github.event.label.name }}" \
            --repo "${{ github.repository }}"
          
          cat > /tmp/comment.txt <<EOF
          ⚠️ **Deployment labels are protected**
          
          The label \`${{ github.event.label.name }}\` was automatically removed.
          
          Deployment and testing status labels are managed by automation and cannot be manually applied.
          
          **To trigger deployments/tests:**
          - Use PR comments: \`/deploy adt\`, \`/test qat\`, etc.
          - Status labels will be auto-added on success
          
          Available protected label prefixes:
          - \`deployed:*\` - Added after successful deployment
          - \`tested:*\` - Added after successful testing
          EOF
          
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --body-file /tmp/comment.txt
          
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}
