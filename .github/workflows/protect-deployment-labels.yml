name: Protect Labels

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check if label was added by automation
        run: |
          echo "Label '${{ github.event.label.name }}' was added by: ${{ github.actor }}"

          # Allow github-actions bot to add labels
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "✅ Label added by automation - allowed"
            exit 0
          fi

          # Check if this is a specific deployment/testing label
          LABEL_NAME="${{ github.event.label.name }}"

          # Default message for unknown labels
          SPECIFIC_MESSAGE="**To trigger deployments/tests:**
          - Use PR comments: \`/deploy adt\`, \`/test qat\`, etc."

          # Override with specific message if it's one of the known labels
          case "$LABEL_NAME" in
            "deployed:adt")
              SPECIFIC_MESSAGE="**To deploy to ADT, use the PR comment: \`/deploy adt\`**"
              ;;
            "deployed:qat")
              SPECIFIC_MESSAGE="**To deploy to QAT, use the PR comment: \`/deploy qat\`**"
              ;;
            "deployed:crptrn")
              SPECIFIC_MESSAGE="**To deploy to CRPTRN, use the PR comment: \`/deploy crptrn\`**"
              ;;
            "tested:adt")
              SPECIFIC_MESSAGE="**To test in ADT, use the PR comment: \`/test adt\`**"
              ;;
            "tested:qat")
              SPECIFIC_MESSAGE="**To test in QAT, use the PR comment: \`/test qat\`**"
              ;;
            "tested:crptrn")
              SPECIFIC_MESSAGE="**To test in CRPTRN, use the PR comment: \`/test crptrn\`**"
              ;;
          esac

          # Remove the label
          echo "❌ Removing manually-added label: $LABEL_NAME"

          gh pr edit ${{ github.event.pull_request.number }} \
            --remove-label "$LABEL_NAME" \
            --repo "${{ github.repository }}"

          # Post comment with appropriate message
          cat > /tmp/comment.txt <<EOF
          ⚠️ **Label removed**

          The label \`$LABEL_NAME\` was automatically removed.

          Deployment and testing status labels are managed by automation and cannot be manually applied.

          $SPECIFIC_MESSAGE

          The label will be automatically added when the deployment/test completes successfully.
          EOF

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --body-file /tmp/comment.txt

          echo "✅ Label removed successfully"
        env:
          GH_TOKEN: ${{ github.token }}
